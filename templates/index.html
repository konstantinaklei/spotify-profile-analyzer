<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotiStats</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #121212; 
            color: #FFFFFF; 
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 40px;
        }

        .header-section { margin-bottom: 30px; }
        .greeting { font-size: 32px; font-weight: 900; margin: 0; }
        
        .menu {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .menu-btn {
            background-color: transparent;
            color: #B3B3B3;
            border: none;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .menu-btn:hover { color: #FFF; }
        
        .menu-btn.active {
            background-color: #1DB954; 
            color: #FFF;
        }

        .list-container {
            display: none; 
        }

        .list-container.active {
            display: block; 
        }

        .item-card {
            display: flex; 
            align-items: center; 
            background-color: #181818;
            padding: 10px 20px;
            margin-bottom: 8px;
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        
        .item-card:hover { background-color: #282828; }

        .rank { width: 30px; font-weight: bold; font-size: 18px; color: #B3B3B3; }
        
        .item-image {
            width: 50px;
            height: 50px;
            border-radius: 4px; 
            margin-right: 15px;
            object-fit: cover;
        }

        .artist-image { border-radius: 50%; } 

        .item-info { display: flex; flex-direction: column; }
        .title { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .subtitle { color: #B3B3B3; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header-section">
        <h1 class="greeting" id="dynamic-greeting"></h1>
    </div>

    <div class="menu">
        <button class="menu-btn active" onclick="switchTab('tracks')">Top Tracks</button>
        <button class="menu-btn" onclick="switchTab('artists')">Top Artists</button>
    </div>

    <div id="tracks-list" class="list-container active">
        {% for track in tracks %}
        <div class="item-card">
            <div class="rank">{{ loop.index }}</div>
            <img class="item-image" src="{{ track.album.images[0].url }}" alt="Album cover">
            <div class="item-info">
                <div class="title">{{ track.name }}</div>
                <div class="subtitle">{{ track.artists[0].name }}</div>
            </div>
        </div>
        {% endfor %}
    </div>

    <div id="artists-list" class="list-container">
        {% for artist in artists %}
        <div class="item-card">
            <div class="rank">{{ loop.index }}</div>
            <img class="item-image artist-image" src="{{ artist.images[0].url }}" alt="Artist image">
            <div class="item-info">
                <div class="title">{{ artist.name }}</div>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        const hour = new Date().getHours();
        let greetingWord = (hour < 12) ? "ΚΑΛΗΜΕΡΑ" : "ΚΑΛΗΣΠΕΡΑ";
        const userName = "{{ user_name }}".toUpperCase();
        document.getElementById("dynamic-greeting").innerText = greetingWord + " " + userName;

        // Tabs
        function switchTab(tabName) {
            document.querySelectorAll('.list-container').forEach(list => list.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));

            if (tabName === 'tracks') {
                document.getElementById('tracks-list').classList.add('active');
                document.querySelectorAll('.menu-btn')[0].classList.add('active');
            } else if (tabName === 'artists') {
                document.getElementById('artists-list').classList.add('active');
                document.querySelectorAll('.menu-btn')[1].classList.add('active');
            }
        }
    </script>

</body>
</html>
