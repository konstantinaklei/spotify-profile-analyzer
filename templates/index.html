<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotiStats</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #121212; 
            color: #FFFFFF; 
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 40px;
        }

        .header-section {
            margin-bottom: 40px;
        }

        .greeting {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1px;
            margin: 0;
        }

        h2 {
            color: #1DB954; 
            font-size: 24px;
            margin-bottom: 20px;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            background-color: #181818; 
            margin-bottom: 12px;
            padding: 15px 20px;
            border-radius: 8px; 
            transition: background-color 0.3s;
        }

        li:hover {
            background-color: #282828; 
        }

        .song-name {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 4px;
        }

        .artist-name {
            color: #B3B3B3; 
            font-size: 14px;
            font-weight: 400;
        }
        .track-item {
        display: flex; 
        align-items: center; 
        background-color: #181818;
        padding: 10px 20px;
        margin-bottom: 8px;
        border-radius: 5px;
    }
    
    .track-rank {
        width: 30px;
        font-weight: bold;
        font-size: 18px;
    }

    .track-image {
        width: 50px;
        height: 50px;
        border-radius: 4px;
        margin-right: 15px;
    }

    .track-info {
        display: flex;
        flex-direction: column; 
    }
    </style>
</head>
<body>

    <div class="header-section">
        <h1 class="greeting" id="dynamic-greeting"></h1>
    </div>

    <h2>Τα 10 Αγαπημένα σου Τραγούδια</h2>
    <ul>
        {% for track in tracks %}
        <li>
            <div class="song-name">{{ track.name }}</div>
            <div class="artist-name">{{ track.artists[0].name }}</div>
        </li>
        {% endfor %}
    </ul>

    <script>
        const hour = new Date().getHours();
        let greetingWord = (hour < 12) ? "ΚΑΛΗΜΕΡΑ" : "ΚΑΛΗΣΠΕΡΑ";
        
        const userName = "{{ user_name }}".toUpperCase();
        
        document.getElementById("dynamic-greeting").innerText = greetingWord + " " + userName;
    </script>

</body>
</html>
